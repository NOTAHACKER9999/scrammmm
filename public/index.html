<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scramjet Proxy on Vercel</title>
</head>
<body>
  <h1>Scramjet Proxy (Vercel)</h1>

  <form id="proxyForm">
    <input type="text" id="url" placeholder="Enter URL to proxy" size="60" />
    <button type="submit">Go</button>
  </form>

  <iframe id="proxyFrame" width="100%" height="600px"></iframe>

  <script>
    const form = document.getElementById("proxyForm");
    const iframe = document.getElementById("proxyFrame");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const url = document.getElementById("url").value.trim();
      if (!url) return;
      const encoded = encodeURIComponent(url);
      iframe.src = `/api/proxy?url=${encoded}`;
    });
  </script>
</body>
</html>
